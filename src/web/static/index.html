<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand QA Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --pass: #16a34a;
      --pass-bg: #dcfce7;
      --borderline: #d97706;
      --borderline-bg: #fef3c7;
      --fail: #dc2626;
      --fail-bg: #fee2e2;
      --critical: #dc2626;
      --critical-bg: #fee2e2;
      --major: #d97706;
      --major-bg: #fef3c7;
      --minor: #64748b;
      --minor-bg: #f1f5f9;
      --visual: #7c3aed;
      --visual-bg: #ede9fe;
      --language: #0369a1;
      --language-bg: #e0f2fe;
      --conf-high: #16a34a;
      --conf-high-bg: #dcfce7;
      --conf-medium: #d97706;
      --conf-medium-bg: #fef3c7;
      --conf-low: #64748b;
      --conf-low-bg: #f1f5f9;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--muted);
      margin-top: 0.375rem;
      font-size: 0.9375rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.25rem;
    }

    /* ── Form ── */
    .form-row {
      display: flex;
      gap: 0.625rem;
    }

    .form-row input {
      flex: 1;
      padding: 0.625rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9375rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }

    .form-row input:focus {
      border-color: var(--accent);
      background: #fff;
    }

    .form-row button {
      padding: 0.625rem 1.25rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .form-row button:hover:not(:disabled) { background: var(--accent-hover); }
    .form-row button:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Loading ── */
    #loading {
      display: none;
      align-items: center;
      gap: 0.75rem;
      color: var(--muted);
      font-size: 0.9375rem;
      padding: 0.5rem 0;
    }

    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ── */
    #error {
      display: none;
      padding: 0.875rem 1rem;
      background: var(--fail-bg);
      border: 1px solid #fca5a5;
      border-radius: 8px;
      color: var(--fail);
      font-size: 0.9375rem;
    }

    /* ── Results ── */
    #results { display: none; }

    .result-header {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .score-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      flex-shrink: 0;
      border: 3px solid currentColor;
    }

    .score-circle.pass       { color: var(--pass);       background: var(--pass-bg); }
    .score-circle.borderline { color: var(--borderline); background: var(--borderline-bg); }
    .score-circle.fail       { color: var(--fail);       background: var(--fail-bg); }

    .score-denom {
      font-size: 0.6rem;
      font-weight: 600;
      opacity: 0.7;
      line-height: 1;
    }

    .result-meta { flex: 1; min-width: 0; }

    .overall-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.8125rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.375rem;
    }

    .overall-badge.pass       { background: var(--pass-bg);       color: var(--pass); }
    .overall-badge.borderline { background: var(--borderline-bg); color: var(--borderline); }
    .overall-badge.fail       { background: var(--fail-bg);       color: var(--fail); }

    .confidence-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: 0.375rem;
      vertical-align: middle;
    }
    .confidence-badge.high   { background: var(--conf-high-bg);   color: var(--conf-high); }
    .confidence-badge.medium { background: var(--conf-medium-bg); color: var(--conf-medium); }
    .confidence-badge.low    { background: var(--conf-low-bg);    color: var(--conf-low); }

    .result-url {
      font-size: 0.875rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Summary ── */
    .section-title {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.625rem;
    }

    .summary-text {
      font-size: 0.9375rem;
      line-height: 1.6;
      color: var(--text);
    }

    /* ── Findings ── */
    .findings-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .finding {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.875rem 1rem;
    }

    .finding-badges {
      display: flex;
      gap: 0.375rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .badge.critical { background: var(--critical-bg); color: var(--critical); }
    .badge.major    { background: var(--major-bg);    color: var(--major); }
    .badge.minor    { background: var(--minor-bg);    color: var(--minor); }
    .badge.visual   { background: var(--visual-bg);   color: var(--visual); }
    .badge.language { background: var(--language-bg); color: var(--language); }

    .finding-rule {
      font-weight: 600;
      font-size: 0.9375rem;
      margin-bottom: 0.375rem;
    }

    .finding-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-top: 0.375rem;
    }

    .finding-text {
      font-size: 0.875rem;
      color: var(--text);
      line-height: 1.5;
      margin-top: 0.125rem;
    }

    .no-findings {
      text-align: center;
      color: var(--muted);
      font-size: 0.9375rem;
      padding: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Brand QA Assistant</h1>
      <p>Enter a URL to check it against your brand guidelines.</p>
    </header>

    <div class="card">
      <div class="form-row">
        <input id="url-input" type="url" placeholder="https://example.com" autocomplete="off" />
        <button id="submit-btn" onclick="startReview()">Review</button>
      </div>
    </div>

    <div id="loading" class="card" style="display:none; flex-direction:row;">
      <div class="spinner"></div>
      <span>Reviewing page — this may take 20–40 seconds…</span>
    </div>

    <div id="error"></div>

    <div id="results">
      <div class="card">
        <div class="result-header">
          <div class="score-circle" id="score-circle">
            <div>
              <span id="score-value"></span>
              <div class="score-denom">/10</div>
            </div>
          </div>
          <div class="result-meta">
            <div>
              <span class="overall-badge" id="overall-badge"></span>
              <span class="confidence-badge" id="confidence-badge"></span>
            </div>
            <div class="result-url" id="result-url"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Summary</div>
        <div class="summary-text" id="summary-text"></div>
      </div>

      <div class="card">
        <div class="section-title" id="findings-title"></div>
        <div class="findings-list" id="findings-list"></div>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('url-input');
    const btn = document.getElementById('submit-btn');
    const loading = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const results = document.getElementById('results');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') startReview(); });

    function setLoading(on) {
      btn.disabled = on;
      loading.style.display = on ? 'flex' : 'none';
    }

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
      results.style.display = 'none';
    }

    function clearError() {
      errorEl.style.display = 'none';
      errorEl.textContent = '';
    }

    async function startReview() {
      const url = input.value.trim();
      if (!url) { input.focus(); return; }

      clearError();
      results.style.display = 'none';
      setLoading(true);

      try {
        const res = await fetch('/api/review', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });
        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || `HTTP ${res.status}`);
        }
        const data = await res.json();
        renderResults(data);
      } catch (err) {
        showError(`Review failed: ${err.message}`);
      } finally {
        setLoading(false);
      }
    }

    function renderResults(data) {
      const overall = data.overall || 'fail';
      const score = data.score ?? 0;
      const confidence = data.confidence || 'low';

      // Score circle
      const circle = document.getElementById('score-circle');
      circle.className = `score-circle ${overall}`;
      document.getElementById('score-value').textContent = score;

      // Overall badge
      const badge = document.getElementById('overall-badge');
      badge.textContent = overall.toUpperCase();
      badge.className = `overall-badge ${overall}`;

      // Confidence badge
      const confBadge = document.getElementById('confidence-badge');
      confBadge.textContent = confidence.charAt(0).toUpperCase() + confidence.slice(1) + ' confidence';
      confBadge.className = `confidence-badge ${confidence}`;

      // URL
      document.getElementById('result-url').textContent = data.url || '';

      // Summary
      document.getElementById('summary-text').textContent = data.summary || '';

      // Findings
      const findings = data.findings || [];
      const title = document.getElementById('findings-title');
      const list = document.getElementById('findings-list');

      title.textContent = `Findings (${findings.length})`;
      list.innerHTML = '';

      if (findings.length === 0) {
        list.innerHTML = '<div class="no-findings">No issues found.</div>';
      } else {
        findings.forEach(f => {
          list.appendChild(buildFinding(f));
        });
      }

      results.style.display = 'block';
      results.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function buildFinding(f) {
      const el = document.createElement('div');
      el.className = 'finding';
      const guidelineHtml = f.guideline_source
        ? `<div class="finding-label">Guideline</div>
           <div class="finding-text" style="font-style:italic">${esc(f.guideline_source)}</div>`
        : '';
      el.innerHTML = `
        <div class="finding-badges">
          <span class="badge ${f.severity}">${f.severity}</span>
          <span class="badge ${f.category}">${f.category}</span>
        </div>
        <div class="finding-rule">${esc(f.rule)}</div>
        ${guidelineHtml}
        <div class="finding-label">Observation</div>
        <div class="finding-text">${esc(f.observation)}</div>
        <div class="finding-label">Recommendation</div>
        <div class="finding-text">${esc(f.recommendation)}</div>
      `;
      return el;
    }

    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
