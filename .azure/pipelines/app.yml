# Application pipeline — builds the Docker image and deploys to Container App.
#
# Triggers on changes to src/, Dockerfile, or pyproject.toml on main.
# Run manually when you need to deploy without a code change (e.g. after infra-only deploys).
#
# Required variable group "brand-qa-assistant" (Library → Variable groups):
#   AZURE_SERVICE_CONNECTION  — ARM service connection name
#   RESOURCE_GROUP            — e.g. rg-brand-qa-assistant-prod
#   ACR_NAME                  — ACR name (without .azurecr.io), e.g. acr<token>
#   CONTAINER_APP_NAME        — Container App name, e.g. ca-<token>

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - src/**
      - Dockerfile
      - pyproject.toml

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  - group: brand-qa-assistant
  - name: IMAGE_NAME
    value: brand-qa-assistant
  - name: IMAGE_TAG
    value: $(Build.BuildId)

steps:
  - task: AzureCLI@2
    displayName: Build and push image to ACR
    inputs:
      azureSubscription: $(AZURE_SERVICE_CONNECTION)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az acr build \
          --registry $(ACR_NAME) \
          --image $(IMAGE_NAME):$(IMAGE_TAG) \
          --image $(IMAGE_NAME):latest \
          .

  - task: AzureCLI@2
    displayName: Deploy to Container App
    inputs:
      azureSubscription: $(AZURE_SERVICE_CONNECTION)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        # Configure ACR registry using managed identity (idempotent)
        az containerapp registry set \
          --name $(CONTAINER_APP_NAME) \
          --resource-group $(RESOURCE_GROUP) \
          --server $(ACR_NAME).azurecr.io \
          --identity system

        az containerapp update \
          --name $(CONTAINER_APP_NAME) \
          --resource-group $(RESOURCE_GROUP) \
          --image $(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(IMAGE_TAG)
