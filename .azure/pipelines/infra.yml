# Infrastructure pipeline — deploys Bicep to Azure.
#
# Triggers on changes to infra/ on main.
# First run: create the resource group manually before running this pipeline.
#
# Required variable group "brand-qa-assistant" (Library → Variable groups):
#   AZURE_SERVICE_CONNECTION  — ARM service connection name
#   RESOURCE_GROUP            — e.g. rg-brand-qa-assistant-prod
#   LOCATION                  — e.g. eastus2
#   ENVIRONMENT_NAME          — e.g. prod

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  - group: brand-qa-assistant

steps:
  - task: AzureCLI@2
    displayName: Create resource group (idempotent)
    inputs:
      azureSubscription: $(AZURE_SERVICE_CONNECTION)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az group create \
          --name $(RESOURCE_GROUP) \
          --location $(LOCATION) \
          --tags project=brand-qa-assistant environment=$(ENVIRONMENT_NAME)

  - task: AzureCLI@2
    displayName: Validate Bicep
    inputs:
      azureSubscription: $(AZURE_SERVICE_CONNECTION)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az deployment group validate \
          --resource-group $(RESOURCE_GROUP) \
          --template-file infra/main.bicep \
          --parameters infra/main.bicepparam \
          --parameters environmentName=$(ENVIRONMENT_NAME) \
          --parameters location=$(LOCATION)

  - task: AzureCLI@2
    displayName: Deploy Bicep infrastructure
    inputs:
      azureSubscription: $(AZURE_SERVICE_CONNECTION)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az deployment group create \
          --resource-group $(RESOURCE_GROUP) \
          --template-file infra/main.bicep \
          --parameters infra/main.bicepparam \
          --parameters environmentName=$(ENVIRONMENT_NAME) \
          --parameters location=$(LOCATION) \
          --name "infra-$(Build.BuildId)"
